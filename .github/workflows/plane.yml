name: Build Plane Offline Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-offline-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Pull Plane Helm Chart
        run: |
          helm repo add plane https://helm.plane.so
          helm repo update
          helm pull plane/plane --version 0.1.0 --untar
          tar czvf plane-chart.tar.gz plane/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (optional)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Plane images
        run: |
          docker pull plane/plane-frontend:latest
          docker pull plane/plane-backend:latest
          docker pull plane/plane-worker:latest
          docker pull plane/plane-beat:latest
          docker pull minio/minio:latest
          docker pull postgres:15
          docker pull redis:7

      - name: Save images to tar
        run: |
          docker save \
            plane/plane-frontend:latest \
            plane/plane-backend:latest \
            plane/plane-worker:latest \
            plane/plane-beat:latest \
            minio/minio:latest \
            postgres:15 \
            redis:7 \
            -o plane-images.tar

      - name: Create offline package
        run: |
          mkdir output
          mv plane-images.tar output/
          mv plane-chart.tar.gz output/
          tar czvf plane-offline-package.tar.gz output/

      - name: Upload offline package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: plane-offline-package.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
