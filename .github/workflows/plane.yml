name: Build Plane Offline Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-offline-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Pull Plane Helm Chart (plane-ce)
        run: |
          helm repo add plane https://helm.plane.so
          helm repo update
          helm pull plane/plane-ce --version 1.6.0 --untar
          tar czvf plane-chart.tar.gz plane-ce/

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Plane CE images (GHCR)
        run: |
          docker pull ghcr.io/makeplane/plane-ce-frontend:1.6.0
          docker pull ghcr.io/makeplane/plane-ce-backend:1.6.0
          docker pull ghcr.io/makeplane/plane-ce-worker:1.6.0
          docker pull ghcr.io/makeplane/plane-ce-beat:1.6.0
          docker pull minio/minio:latest
          docker pull postgres:15
          docker pull redis:7

      - name: Save images to tar
        run: |
          docker save \
            ghcr.io/makeplane/plane-ce-frontend:1.6.0 \
            ghcr.io/makeplane/plane-ce-backend:1.6.0 \
            ghcr.io/makeplane/plane-ce-worker:1.6.0 \
            ghcr.io/makeplane/plane-ce-beat:1.6.0 \
            minio/minio:latest \
            postgres:15 \
            redis:7 \
            -o plane-images.tar

      - name: Create offline package
        run: |
          mkdir output
          mv plane-images.tar output/
          mv plane-chart.tar.gz output/
          tar czvf plane-offline-package.tar.gz output/

      - name: Upload offline package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: plane-offline-package.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
