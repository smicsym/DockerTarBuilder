name: Package Plane Enterprise Air-Gapped Assets

on:
  workflow_dispatch:
    inputs:
      plane_version:
        description: 'Plane Enterprise Version'
        required: true
        default: 'v3.0.0'

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      # ========== 步骤 1：准备 Helm 仓库与依赖 ==========
      - name: Setup Helm Repositories
        run: |
          helm repo add plane https://helm.plane.so/
          helm repo add traefik https://traefik.github.io/charts
          helm repo update

      # ========== 步骤 2：完整打包 Helm Chart (含依赖与 Air-gapped 配置) ==========
      - name: Package Full Helm Chart
        run: |
          PLANE_VERSION="${{ github.event.inputs.plane_version }}"
          echo "正在下载 Plane EE Chart (版本: $PLANE_VERSION)..."
          
          # 下载源码并解压
          helm pull plane/plane-enterprise --version "$PLANE_VERSION" --untar --untardir ./plane-chart-src
          
          CHART_DIR=$(find ./plane-chart-src -maxdepth 1 -type d | tail -n 1)
          
          echo "正在构建 Helm 子依赖包..."
          helm dependency build "$CHART_DIR" || true

          # 强制开启 airgapped.enabled 及基础离线配置
          if [ -f "$CHART_DIR/values.yaml" ]; then
            echo "正在开启 airgapped.enabled 配置..."
            yq e '.airgapped.enabled = true' -i "$CHART_DIR/values.yaml"
            yq e '.planeVersion = "'"$PLANE_VERSION"'"' -i "$CHART_DIR/values.yaml"
            yq e '.ingress.enabled = true' -i "$CHART_DIR/values.yaml"
            yq e '.ingress.ingressClass = "traefik"' -i "$CHART_DIR/values.yaml"
          fi

          echo "正在打包离线 Helm 包..."
          OUTPUT_NAME="plane-enterprise-helm-full.tar.gz"
          tar -czf "$OUTPUT_NAME" -C "$CHART_DIR" .

          echo "Helm 离线包大小: $(du -sh "$OUTPUT_NAME" | cut -f1)"

      - name: Upload Helm Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plane-enterprise-helm-full
          path: plane-enterprise-helm-full.tar.gz
          retention-days: 2

      # ========== 步骤 3：提取所有离线镜像列表 (包含 Airgapped 特有镜像) ==========
      - name: Extract All Required Images
        id: list_images
        run: |
          PLANE_VERSION="${{ github.event.inputs.plane_version }}"
          
          # 渲染 Plane 主服务的模板，显式带上 airgapped.enabled=true 提取镜像
          helm template plane-app plane/plane-enterprise \
            --version "$PLANE_VERSION" \
            --set airgapped.enabled=true \
            --set ingress.enabled=true \
            --set ingress.ingressClass=traefik | \
            yq e '.. | select(has("image")) | .image | select(. != null)' - | \
            sort -u > raw_images.txt

          # 补充提取 Traefik Ingress Controller 镜像
          helm template traefik traefik/traefik | \
            yq e '.. | select(has("image")) | .image | select(. != null)' - | \
            sort -u >> raw_images.txt

          # 格式化与去重
          sed -i '/---/d' raw_images.txt
          sed -i '/^\s*$/d' raw_images.txt
          sort -u raw_images.txt > images.txt

          echo "========================================"
          echo "           Plane 待拉取离线镜像列表"
          echo "========================================"
          cat images.txt
          echo "========================================"
          echo "共计 $(wc -l < images.txt) 个镜像"
          echo "========================================"

      # ========== 步骤 4：拉取并打包所有容器镜像 ==========
      - name: Pull and Package All Images
        run: |
          mapfile -t IMAGES < images.txt
          
          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "Error: 未在 Chart 模版中检测到任何镜像！"
            exit 1
          fi

          echo "=========================================="
          echo "正在拉取所有官方镜像 (共 ${#IMAGES[@]} 个)..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载镜像: $img ..."
            docker pull "$img"
          done
          echo "所有镜像下载完毕。"

          echo "=========================================="
          echo "正在打包并压缩镜像文件..."
          echo "=========================================="
          OUTPUT_NAME="plane-enterprise-images.tar.gz"
          
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"

          echo "打包完成！文件大小："
          du -sh "$OUTPUT_NAME"

      # ========== 步骤 5：上传镜像 Artifact ==========
      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plane-enterprise-offline-images
          path: plane-enterprise-images.tar.gz
          retention-days: 2
