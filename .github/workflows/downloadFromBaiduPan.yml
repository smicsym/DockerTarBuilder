name: Download Baidu Netdisk Folder

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "请输入要下载的百度网盘文件夹路径，例如 /我的资源/项目A"
        required: true
        default: "/"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install BaiduPCS-Go (auto-detect latest version)
        run: |
          LATEST=$(curl -s https://api.github.com/repos/qjfoidnh/BaiduPCS-Go/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Latest version: $LATEST"

          URL="https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/${LATEST}/BaiduPCS-Go-linux-amd64.zip"
          echo "Downloading: $URL"

          wget "$URL" -O BaiduPCS-Go.zip
          unzip BaiduPCS-Go.zip
          sudo mv BaiduPCS-Go /usr/local/bin/baidupcs

      - name: Login to Baidu Netdisk
        run: |
          baidupcs login --bduss="${{ secrets.BDUSS }}" --stoken="${{ secrets.STOKEN }}"

      - name: List root directory
        run: |
          echo "📂 根目录内容："
          baidupcs ls /

      - name: List target folder
        run: |
          echo "📂 目标文件夹内容：${{ github.event.inputs.folder }}"
          baidupcs ls "${{ github.event.inputs.folder }}"

      - name: Download folder
        run: |
          mkdir -p downloaded
          echo "⬇️ 正在下载：${{ github.event.inputs.folder }}"
          baidupcs download "${{ github.event.inputs.folder }}" --saveto=downloaded --recursive

      - name: Upload downloaded files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: baidu-folder
          path: downloaded
