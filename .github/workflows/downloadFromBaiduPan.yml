name: Download Baidu Netdisk Folder

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "请输入要下载的百度网盘文件夹路径，例如 /我的资源/项目A"
        required: true
        default: "/"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install BaiduPCS-Go (auto-detect latest linux-amd64)
        run: |
          # 获取最新 release JSON
          RELEASE_JSON=$(curl -s https://api.github.com/repos/qjfoidnh/BaiduPCS-Go/releases/latest)

          # 从 assets 中筛选 linux-amd64 的下载链接
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | \
            grep -E '"browser_download_url":' | \
            grep 'linux-amd64' | \
            cut -d '"' -f 4)

          echo "Download URL: $DOWNLOAD_URL"

          # 下载
          wget "$DOWNLOAD_URL" -O BaiduPCS-Go.zip
          unzip BaiduPCS-Go.zip

          # 找到解压后的二进制文件
          BIN=$(find . -maxdepth 1 -type f -name "BaiduPCS-Go*" | head -n 1)
          echo "Binary: $BIN"

          sudo mv "$BIN" /usr/local/bin/baidupcs
          sudo chmod +x /usr/local/bin/baidupcs


      - name: Login to Baidu Netdisk
        run: |
          baidupcs login --bduss="${{ secrets.BDUSS }}" --stoken="${{ secrets.STOKEN }}"

      - name: List root directory
        run: |
          echo "📂 根目录内容："
          baidupcs ls /

      - name: List target folder
        run: |
          echo "📂 目标文件夹内容：${{ github.event.inputs.folder }}"
          baidupcs ls "${{ github.event.inputs.folder }}"

      - name: Download folder
        run: |
          mkdir -p downloaded
          echo "⬇️ 正在下载：${{ github.event.inputs.folder }}"
          baidupcs download "${{ github.event.inputs.folder }}" --saveto=downloaded --recursive

      - name: Upload downloaded files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: baidu-folder
          path: downloaded
