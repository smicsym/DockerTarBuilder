name: Package Plane CE for Air-Gapped Deployment

on:
  workflow_dispatch: # 允许手动触发
    inputs:
      plane_ce_chart_version:
        description: 'Plane CE Helm Chart Version (e.g., 1.3.3)'
        required: true
        default: '1.3.3'
        type: string
      plane_ce_app_version:
        description: 'Plane CE Application Version (Optional, will try to detect from chart)'
        required: false
        type: string

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    # 步骤 1: 设置必要的工具
    steps:
      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      # 步骤 2: 提取 Plane CE 版本号
      - name: Extract Plane CE Version
        id: plane_ce_vars
        run: |
          # 使用你指定的 Chart 版本或默认值
          CHART_VERSION="${{ inputs.plane_ce_chart_version }}"
          
          # 添加 Plane CE Helm 仓库并更新
          helm repo add makeplane https://helm.plane.so/
          helm repo update
          
          # 尝试从 Chart 中获取应用版本（如果未指定）
          if [ -z "${{ inputs.plane_ce_app_version }}" ]; then
            echo "尝试从 Helm Chart 自动检测应用版本..."
            PLANE_CE_APP_VERSION=$(helm show chart makeplane/plane-ce --version "$CHART_VERSION" | yq e '.appVersion' -)
            
            if [ -z "$PLANE_CE_APP_VERSION" ] || [ "$PLANE_CE_APP_VERSION" = "null" ]; then
              echo "⚠️ 无法从 Chart 中自动检测到应用版本。请手动指定 'plane_ce_app_version' 输入参数。"
              exit 1
            fi
            echo "✅ 检测到的 Plane CE 应用版本为: $PLANE_CE_APP_VERSION"
          else
            PLANE_CE_APP_VERSION="${{ inputs.plane_ce_app_version }}"
            echo "✅ 使用指定的 Plane CE 应用版本为: $PLANE_CE_APP_VERSION"
          fi

          echo "chart_version=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$PLANE_CE_APP_VERSION" >> $GITHUB_OUTPUT
          # Plane CE 的镜像通常有多个组件，这里我们暂时设置主镜像
          echo "target_web_image=makeplane/plane-web:$PLANE_CE_APP_VERSION" >> $GITHUB_OUTPUT
          echo "target_backend_image=makeplane/plane-backend:$PLANE_CE_APP_VERSION" >> $GITHUB_OUTPUT
          echo "target_worker_image=makeplane/plane-worker:$PLANE_CE_APP_VERSION" >> $GITHUB_OUTPUT
          echo "target_admin_image=makeplane/plane-admin:$PLANE_CE_APP_VERSION" >> $GITHUB_OUTPUT

      # 步骤 3: 提取镜像列表
      - name: Extract Images List
        id: list_images
        run: |
          CHART_VERSION="${{ steps.plane_ce_vars.outputs.chart_version }}"
          
          # 从模板中提取镜像列表
          helm template my-plane-ce makeplane/plane-ce --version "$CHART_VERSION" | \
            yq e '.. | select(has("image")) | .image | select(. != null)' - | \
            sort -u > images.txt
          
          # 清理列表中的空行和分隔符
          sed -i '/---/d' images.txt
          sed -i '/^\s*$/d' images.txt
          
          # 3. 直接把 artifacts.plane.so/makeplane/ 替换为 makeplane/
          sed -i 's|artifacts.plane.so/makeplane/|makeplane/|g' images.txt
          
          echo "========================================"
          echo "       待拉取和处理的镜像列表"
          echo "========================================"
          cat images.txt
          echo "========================================"
          echo "共计 $(wc -l < images.txt) 个镜像"
          echo "========================================"

      # 步骤 4: 拉取所有官方镜像
      - name: Pull All Official Images
        run: |
          mapfile -t IMAGES < images.txt
          
          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "Error: 镜像列表为空！"
            exit 1
          fi

          echo "=========================================="
          echo "正在拉取所有官方镜像 (共 ${#IMAGES[@]} 个)..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done
          echo "✅ 所有官方镜像拉取完成。"

      # 步骤 5: 打包 Helm Chart
      - name: Package Full Helm Chart
        run: |
          CHART_VERSION="${{ steps.plane_ce_vars.outputs.chart_version }}"
          
          echo "正在拉取 Chart 源码..."
          helm pull makeplane/plane-ce --version "$CHART_VERSION" --untar --untardir ./plane-ce-chart-src
          
          CHART_DIR=$(find ./plane-ce-chart-src -maxdepth 1 -type d | tail -n 1)
          echo "Chart 目录: $CHART_DIR"

          # 构建依赖
          echo "正在构建 Helm Chart 依赖..."
          helm dependency build "$CHART_DIR"

          echo "正在打包完整的 Helm Chart..."
          OUTPUT_NAME="plane-ce-helm-full.tar.gz"
          tar -czf "$OUTPUT_NAME" -C "$CHART_DIR" .

          echo "========================================"
          echo "  Helm 完整包大小: $(du -sh "$OUTPUT_NAME" | cut -f1)"
          echo "========================================"

      - name: Upload Helm Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plane-ce-helm-full
          path: plane-ce-helm-full.tar.gz
          retention-days: 1

      # 步骤 6: 保存所有镜像
      - name: Save All Images
        run: |
          mapfile -t IMAGES < images.txt
          
          echo "=========================================="
          echo "正在保存所有镜像..."
          echo "=========================================="
          OUTPUT_NAME="plane-ce-images.tar.gz"
          
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"

          echo "=========================================="
          echo "✅ 打包成功！最终大小："
          du -sh "$OUTPUT_NAME"
          echo "========================================"

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plane-ce-offline-images
          path: plane-ce-images.tar.gz
          retention-days: 1

      # 步骤 7: 生成用于部署的 values.yaml 片段
      - name: Generate Air-Gapped values.yaml Snippet
        run: |
          cat > airgapped-values-snippet.yaml <<EOF
          # 将此片段添加到你的 values.yaml 中
          # 启用 air-gapped 模式
          airgapped:
            enabled: true
            # 如果你的私有仓库使用自签名证书，需要指定 CA 证书的 Secret
            # s3Secrets:
            #   - name: my-registry-ca-secret
            #     key: ca.crt

          # 确保使用你的私有镜像仓库地址
          # image:
          #   repository: your-private-registry.com/makeplane/plane
          #   tag: "${{ steps.plane_ce_vars.outputs.app_version }}"
          #   pullPolicy: IfNotPresent

          # 如果使用外部数据库和缓存，请相应配置
          # postgresql:
          #   enabled: false
          #   externalHostname: your-postgres-host
          #   externalPort: 5432
          #   externalDatabase: plane
          #   externalUser: plane
          #   existingSecret: plane-postgres-secret
          # redis:
          #   enabled: false
          #   host: your-redis-host
          #   port: 6379
          # minio:
          #   enabled: false
          #   externalEndpoint: your-minio-endpoint
          #   existingSecret: plane-minio-secret
          EOF
          
          echo "✅ 已生成 air-gapped values.yaml 片段。"

      - name: Upload values Snippet Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plane-ce-airgapped-values-snippet
          path: airgapped-values-snippet.yaml
          retention-days: 1
